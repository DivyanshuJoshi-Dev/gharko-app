<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gharko - Home Delivery App</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
<h1>Gharko - Home Delivery App</h1>
<button id="themeToggle">Toggle Dark Mode</button>
</header>

<input type="text" id="search" placeholder="Search products...">

<div class="categories">
  <div class="card"><h2>Grocery & Kitchen</h2><p>Rice, Flour, Oils, Spices</p></div>
  <div class="card"><h2>Snacks & Drinks</h2><p>Chips, Soft Drinks, Juices</p></div>
  <div class="card"><h2>Beauty & Personal Care</h2><p>Soap, Shampoo, Skincare</p></div>
  <div class="card"><h2>Household Essentials</h2><p>Cleaners, Detergents, Paper Goods</p></div>
</div>

<h2>Featured Products</h2>
<div id="products" class="products"></div>

<script src="script.js"></script>
</body>
</html>
